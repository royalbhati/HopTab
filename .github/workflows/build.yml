name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Checkout HopTabPro
        run: |
          git clone https://x-access-token:${{ secrets.PRO_PAT }}@github.com/royalbhati/HopTabPro.git HopTabPro

      - name: Build
        run: |
          xcodebuild \
            -project HopTab.xcodeproj \
            -scheme HopTab \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-"
