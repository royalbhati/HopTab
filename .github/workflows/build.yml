name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Checkout HopTabPro
        uses: actions/checkout@v4
        with:
          repository: royalbhati/HopTabPro
          token: ${{ secrets.PRO_PAT }}
          path: HopTabPro

      - name: Build
        run: |
          xcodebuild \
            -project HopTab.xcodeproj \
            -scheme HopTab \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-"
